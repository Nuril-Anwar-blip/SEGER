name: seger_exergame
description: Exergame adaptif untuk Anak Berkebutuhan Khusus
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # pipeline (pose + face)
  google_mlkit_pose_detection: 0.14.1
  google_mlkit_face_detection: 0.13.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Database Lokal
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Camera
  camera: ^0.12.0+1
  permission_handler: ^12.0.3

  # Animation
  rive: ^0.13.0

  # Text to Speech
  flutter_tts: ^4.0.2

  # Utils
  path_provider: ^2.1.4
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/models/
    - assets/json/